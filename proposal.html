<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Proposal Seminar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:#070707;
color:white;
padding:40px;
}

/* tombol kembali */
.back-btn{
display:inline-block;
margin-bottom:20px;
color:#aaa;
text-decoration:none;
transition:.3s;
font-size:14px;
}

.back-btn:hover{
color:#9c7bff;
}

/* banner */
.banner-proposal{
background:#0f0f0f;
border:1px solid #222;
border-radius:20px;
padding:60px;
margin-bottom:30px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.04);
}

.proposal-title{
font-size:clamp(2rem,6vw,3.5rem);
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;
color:white;
}

.proposal-title span{
background:linear-gradient(
120deg,
#ffffff,
#9c7bff,
#ffffff
);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}

/* grid */
.task-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

/* card */
.task-card{
background:#111;
border:1px solid #222;
padding:25px;
border-radius:16px;
text-decoration:none;
color:white;
transition:.3s;
font-weight:600;
text-align:center;
}

.task-card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(156,123,255,.3);
border:1px solid #9c7bff;
}

/* card panjang */
.panjang{
grid-column: span 2;
}

/* animasi */
@keyframes shine{
to{
background-position:200%;
}
}
</style>

</head>

<body>

<a href="index.html" class="back-btn">← Kembali ke Profil</a>

<div class="banner-proposal">
<h1 class="proposal-title">
TUGAS
<span>PROPOSAL SEMINAR</span>
</h1>
</div>

<div class="task-grid">

<a href="https://drive.google.com/file/d/1F1fl1HeLO1XCW7eqZyLbbWKj4C2n25ZT/view?usp=sharing" class="task-card" target="_blank">
PROPOSAL KEGIATAN
</a>

<a href="https://drive.google.com/file/d/1IfG7ib9ORVhBSiWh4irrIgbBaOZzewHT/view" class="task-card" target="_blank">
ANGGARAN BIAYA
</a>

<a href="https://drive.google.com/file/d/1ttRbT4MPoWl7-TSwZFQviQsjRT7RBRPM/view?usp=sharing" class="task-card panjang" target="_blank">
PRESENTASI
</a>

</div>

</body>
</html>
