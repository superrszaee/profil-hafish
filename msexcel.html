<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Microsoft Excel</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#070707;
color:white;
font-family:'Inter',sans-serif;
padding:40px;
}

/* tombol kembali */
.back-btn{
display:inline-block;
margin-bottom:20px;
color:#aaa;
text-decoration:none;
transition:.3s;
font-size:14px;
}

.back-btn:hover{
color:#21a366;
}

/* BANNER */
.banner-excel{
background:#0f0f0f;
border:1px solid #222;
border-radius:20px;
padding:60px;
margin-bottom:30px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.04);
}

/* TEXT */
.excel-title{
font-size:clamp(2rem,6vw,3.5rem);
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;
color:#fff;
opacity:0;
transform:translateY(20px);
animation:reveal 1s ease forwards;
}

.excel-title span{
display:block;
background:linear-gradient(
120deg,
#1d7444,
#21a366,
#ffffff,
#21a366,
#1d7444
);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}

/* GRID */
.task-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

/* CARD */
.task-card{
background:#111;
border:1px solid #222;
padding:25px;
border-radius:16px;
text-decoration:none;
color:white;
transition:.3s;
font-weight:600;
text-align:center;
}

.task-card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(33,163,102,.3);
border:1px solid #21a366;
}

/* ANIMASI */
@keyframes reveal{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes shine{
to{
background-position:200%;
}

}
</style>

</head>

<body>

<a href="index.html" class="back-btn">← Kembali ke Profil</a>

<div class="banner-excel">
<h1 class="excel-title">
MICROSOFT
<span>EXCEL</span>
</h1>
</div>

<div class="task-grid">

<a href="https://drive.google.com/file/d/1sxM_ZauJfS46FwYJ-dmyPR5dQDzbBlZc/view" class="task-card" target="_blank">
LATIHAN
</a>

<a href="https://drive.google.com/file/d/1IfG7ib9ORVhBSiWh4irrIgbBaOZzewHT/view" class="task-card" target="_blank">
ANGGARAN BIAYA
</a>

</div>

</body>
</html>
